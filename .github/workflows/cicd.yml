#Workflow Name
name: CICD

#Workflow Trigger: Manual
on:
  workflow_dispatch:
    inputs:
      environments:
        description: This is the enviroment where the workflow runs
        default: 'dev'
        required: true
        type: choice
        options: 
          - dev
          - stagging
          - prod

#Jobs
jobs:

  #Job 1:
  code: 
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        run: echo "clonning code"
  
  #Job 2:
  build:
    needs: [code]
    runs-on: ubuntu-latest
    steps:
      - name: build the code
        run: echo "building code"
  
  #Job 3:
  test:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: test the code
        run: echo "testing the code"
  
  #Job 3: 
  deploy:
    if: inputs.environments == 'dev'
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: deploy the code
        run: echo "deploying the code"


    
